<!DOCTYPE html>
<html>

<head>
    <title>All Users</title>
</head>

<body>

    <h1>Admin Dashboard</h1>

    <table border="1">

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Weight</th>
            <th>Goal</th>
            <th>Intensity</th>
        </tr>

        {% for user in users %}

        <tr>
            <td>{{ user.id }}</td>
            <td>{{ user.name }}</td>
            <td>{{ user.age }}</td>
            <td>{{ user.weight }}</td>
            <td>{{ user.goal }}</td>
            <td>{{ user.intensity }}</td>
        </tr>

        {% endfor %}

    </table>

</body>

</html>
